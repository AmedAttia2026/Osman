<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ cat_info['name'] }} | Ahmed Osman</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="top-banner" style="height: 25vh; min-height: 180px; {% if banner %} background-image: url('data:image/jpeg;base64,{{ banner }}'); {% endif %}">
        <div class="banner-text-container">
            <span class="banner-subtitle">Photographer</span>
            <div class="banner-title" style="font-size: clamp(1.8rem, 6vw, 3.5rem);">Ahmed Osman</div>
        </div>
    </header>

    <nav class="nav-bar">
        <h1 class="nav-title">{{ cat_info['name'] }}</h1>
        <a href="{{ url_for('index') }}" class="btn-back-nav"><i class="fas fa-arrow-right"></i> رجوع</a>
    </nav>

    <main class="masonry-grid">
        {% if cat_info.get('images') %}
            {% for image in cat_info['images'] %}
                <div class="masonry-item" onclick="openLb('data:image/jpeg;base64,{{ image }}')">
                    
                    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" 
                         data-src="data:image/jpeg;base64,{{ image }}" 
                         class="lazy-image" 
                         alt="Ahmed Osman Photo" 
                         loading="lazy">
                    
                    <div class="watermark-protection"></div>
                    
                    <div class="zoom-overlay"><i class="fas fa-search-plus"></i></div>
                </div>
            {% endfor %}
        {% else %}
            <p style="text-align:center; color:var(--text-sub); margin-top:50px;">لا توجد صور حالياً في هذا الألبوم.</p>
        {% endif %}
    </main>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
        <span class="close-lb">&times;</span>
        <img id="lb-img" onclick="event.stopPropagation()">
        <div class="watermark-protection" style="z-index: 100000; position: absolute; inset: 0;"></div>
    </div>

    <script>
        function openLb(src) { document.getElementById('lightbox').style.display = 'flex'; document.getElementById('lb-img').src = src; }

        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || e.keyCode === 44) {
                navigator.clipboard.writeText(''); 
                alert('عفواً، أخذ لقطة شاشة غير مسموح لحماية حقوق الملكية.');
            }
            if (e.keyCode === 123) { e.preventDefault(); }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); }
            if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); }
            if (e.ctrlKey && e.keyCode === 83) { e.preventDefault(); }
            if (e.ctrlKey && e.keyCode === 80) { e.preventDefault(); }
            if (e.ctrlKey && e.keyCode === 67) { e.preventDefault(); }
        });

        window.addEventListener('blur', function() {
            document.body.classList.add('blur-protect');
        });

        window.addEventListener('focus', function() {
            document.body.classList.remove('blur-protect');
        });

        // ========================================================
        // سكريبت التحميل الذكي (Lazy Load) للصور واحدة بواحدة
        // ========================================================
        document.addEventListener("DOMContentLoaded", function() {
            let lazyImages = [].slice.call(document.querySelectorAll("img.lazy-image"));

            if ("IntersectionObserver" in window) {
                let lazyImageObserver = new IntersectionObserver(function(entries, observer) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            let lazyImage = entry.target;
                            // استبدال الصورة الشفافة بالصورة الحقيقية
                            lazyImage.src = lazyImage.dataset.src;
                            
                            // إعطاء تأثير النعومة عند انتهاء التحميل
                            lazyImage.onload = function() {
                                lazyImage.classList.add("loaded");
                            };
                            
                            lazyImageObserver.unobserve(lazyImage);
                        }
                    });
                });

                lazyImages.forEach(function(lazyImage) {
                    lazyImageObserver.observe(lazyImage);
                });
            } else {
                // دعم للمتصفحات القديمة
                lazyImages.forEach(function(lazyImage) {
                    lazyImage.src = lazyImage.dataset.src;
                    lazyImage.classList.add("loaded");
                });
            }
        });
    </script>
</body>
</html>
