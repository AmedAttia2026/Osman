<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmed Osman | Photographer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-banner" {% if banner %} style="background-image: url('data:image/jpeg;base64,{{ banner }}');" {% endif %}>
        <div class="banner-text-container">
            <span class="banner-subtitle">Photographer</span>
            <div class="banner-title">Ahmed Osman</div>
        </div>
    </header>

    <main class="cat-grid">
        {% for cat in categories %}
            <a href="{{ url_for('category_view', cat_id=cat['_id']) }}" class="cat-card">
                <img src="data:image/jpeg;base64,{{ cat['cover_base64'] }}" alt="{{ cat['name'] }}">
                <div class="cat-content">
                    <h2>{{ cat['name'] }}</h2>
                    <span>شاهد الألبوم</span>
                </div>
            </a>
        {% endfor %}
        
        {% if not categories %}
            <div style="grid-column: 1/-1; text-align:center; padding: 50px; color: var(--text-sub);">
                <h2>المعرض قيد التجهيز...</h2>
            </div>
        {% endif %}
    </main>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.addEventListener('keydown', function(e) {
            if (e.key === 'PrintScreen' || e.keyCode === 44) {
                navigator.clipboard.writeText(''); 
                alert('عفواً، أخذ لقطة شاشة غير مسموح لحماية حقوق الملكية.');
            }
            if (e.keyCode === 123) { e.preventDefault(); }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); }
            if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); }
            if (e.ctrlKey && e.keyCode === 83) { e.preventDefault(); }
            if (e.ctrlKey && e.keyCode === 80) { e.preventDefault(); }
            if (e.ctrlKey && e.keyCode === 67) { e.preventDefault(); }
        });
    </script>
</body>
</html>
